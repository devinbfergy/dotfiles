# vim:ft=tmux
# status
set -g status-position top
set -g status-bg "default"
set -g status-justify "left"
set -g status-left-length 200
set -g status-right-length 100
set -g status-interval 5

# messages
set -g message-style fg="${thm_cyan}",bg="${thm_gray}",align="centre"
set -g message-command-style fg="${thm_cyan}",bg="${thm_gray}",align="centre"

set-window-option -g pane-active-border-style fg=$thm_gray,bg=$thm_gray
set-window-option -g pane-border-style fg=$thm_gray,bg=$thm_gray
set-window-option -g pane-border-lines simple # simple, double, heavy, number, ascii

# windows
setw -g window-status-activity-style fg="${thm_fg}",none
setw -g window-status-separator ""
# setw -g window-status-style fg="${thm_fg}",bg="default",none
set -g status-style bg=default,fg=white # transparent bg with neutral text
tm_tunes="#(osascript -l JavaScript $DOTFILES/applescripts/tunes.js)"
tm_tunes_display="#[bg=default]#[fg=$thm_blue]$tm_separator_right#[bg=$thm_blue]#[fg=$thm_bg]´Çü  ${tm_tunes}"
tm_separator_left="¯é╝"
tm_separator_right="¯é║"
tm_icon="¯ÿ»"
# tm_separator_left="¯é┤"
# tm_separator_right="¯éÂ"

# --------=== Statusline

host="#[fg=$thm_yellow]$tm_separator_right#[fg=$thm_fg]#[fg=$thm_bg,bg=$thm_yellow]´ïû #[bg=$thm_gray]#[fg=$thm_fg] #h"
clock="#[fg=$thm_cyan]$tm_separator_right#[fg=$thm_fg]#[fg=$thm_bg,bg=$thm_cyan]´É║ #[bg=$thm_gray]#[fg=$thm_fg] %H:%M"
set -g status-left "#(claude-status-sessions)"
set -g status-right "#{?$tm_tunes,${tm_tunes_display},} "

# current_dir
# Claude indicators: waiting=blinking, active=icon only
setw -g window-status-format "#[fg=$thm_black4]#{?@claude-waiting,#[fg=$thm_yellow]¾░à® ,#{?@claude-active,#[fg=$thm_green]¾░à® ,}} #{?#{window_name},#W,#{b:pane_current_path}} "
setw -g window-status-current-format "#[fg=$thm_blue,bold]#{?@claude-waiting,#[fg=$thm_yellow,bold]¾░à® ,#{?@claude-active,#[fg=$thm_green]¾░à® ,}} #{?#{window_name},#W,#{b:pane_current_path}} "

# --------=== Modes
setw -g clock-mode-colour "${thm_blue}"
